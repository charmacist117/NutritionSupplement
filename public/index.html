<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NutritionSupplement</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="summary-band">
        <div>
          <p class="eyebrow">Naver Shopping Insight</p>
          <h1>건강식품 월별 검색어 리포트</h1>
          <p id="status">설정 상태를 확인하는 중입니다.</p>
        </div>

        <form id="collect-form" class="collect-form">
          <label>
            시작일
            <input id="start-date" name="startDate" type="date" required>
          </label>
          <label>
            종료일
            <input id="end-date" name="endDate" type="date" required>
          </label>
          <button id="previous-month-button" type="button">직전월</button>
          <button id="collect-button" type="submit">선택 기간 수집</button>
        </form>
      </section>

      <section class="workspace">
        <aside class="month-panel">
          <h2>저장 자료</h2>
          <div id="month-list" class="month-list"></div>
        </aside>

        <section class="report-panel">
          <div class="report-header">
            <div>
              <h2 id="report-title">리포트 선택</h2>
              <p id="report-meta">저장 자료를 선택하거나 기간을 수집하면 Top 500 검색어와 평균 클릭 점수가 표시됩니다.</p>
            </div>
            <div class="report-tools">
              <button id="download-button" type="button" disabled>엑셀 다운로드</button>
              <div class="metric">
                <span>기준 키워드</span>
                <strong id="anchor-keyword">-</strong>
              </div>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>순위</th>
                  <th>검색어</th>
                  <th>일일 점수 평균</th>
                </tr>
              </thead>
              <tbody id="report-body">
                <tr>
                  <td colspan="3">선택된 리포트가 없습니다.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
