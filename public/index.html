<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NutritionSupplement</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="query-panel">
        <div>
          <p class="eyebrow">Naver Shopping Insight</p>
          <h1>NutritionSupplement</h1>
        </div>

        <form id="trend-form" class="form-grid">
          <label>
            시작일
            <input name="startDate" type="date" required>
          </label>
          <label>
            종료일
            <input name="endDate" type="date" required>
          </label>
          <label>
            단위
            <select name="timeUnit">
              <option value="week">주간</option>
              <option value="date">일간</option>
              <option value="month">월간</option>
            </select>
          </label>
          <label>
            쇼핑 카테고리 코드
            <input name="category" placeholder="예: 50000023" required>
          </label>
          <label class="wide">
            키워드
            <input name="keywords" placeholder="마그네슘, 오메가3, 루테인" required>
          </label>
          <label>
            기기
            <select name="device">
              <option value="">전체</option>
              <option value="pc">PC</option>
              <option value="mo">모바일</option>
            </select>
          </label>
          <label>
            성별
            <select name="gender">
              <option value="">전체</option>
              <option value="m">남성</option>
              <option value="f">여성</option>
            </select>
          </label>
          <button type="submit">조회</button>
        </form>
      </section>

      <section class="result-panel">
        <div class="panel-header">
          <h2>결과</h2>
          <span id="status">대기 중</span>
        </div>
        <div id="chart" class="chart"></div>
        <pre id="raw-output"></pre>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
